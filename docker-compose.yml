services:
  postgres:
    image: postgres:15-alpine
    container_name: kbrain-postgres
    environment:
      - POSTGRES_USER=kbrain
      - POSTGRES_PASSWORD=kbrain
      - POSTGRES_DB=kbrain
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kbrain"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./kbrain_backend
      dockerfile: Dockerfile
    container_name: kbrain-backend
    ports:
      - "6969:8000"
    volumes:
      - ./kbrain_backend/storage_data:/app/storage_data
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://kbrain:kbrain@postgres:5432/kbrain
      - STORAGE_BACKEND=local
      - STORAGE_ROOT=storage_data
      - CORS_ORIGINS=["http://localhost:80", "http://localhost"]
      # RabbitMQ
      - RABBITMQ_URL=amqp://admin:admin123@rabbitmq:5672/
      # OpenAI (for document/image processing)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1/chat/completions}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.2-2025-12-11}
      # XLSX Medication Processor
      - XLSX_MEDICATION_SERVICE_URL=${XLSX_MEDICATION_SERVICE_URL:-}
      # RAGFlow
      - RAGFLOW_URL=${RAGFLOW_URL:-}
      - RAGFLOW_API_KEY=${RAGFLOW_API_KEY:-}
      - RAGFLOW_DATASET_ID=${RAGFLOW_DATASET_ID:-}
      - RAGFLOW_WAIT_FOR_PARSING=${RAGFLOW_WAIT_FOR_PARSING:-true}
      - RAGFLOW_MAX_WAIT=${RAGFLOW_MAX_WAIT:-3000.0}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./kbrain_frontend
      dockerfile: Dockerfile
    container_name: kbrain-frontend
    expose:
      - "5173"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    build:
      context: ./kbrain-nginx
      dockerfile: Dockerfile
    container_name: kbrain-nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  default:
    name: kbrain-network
